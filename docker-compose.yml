services:
  llm-api-search:
    build: .
    container_name: llm-api-search
    restart: unless-stopped
    ports:
      # Localhost only — the host nginx reverse proxy (llm-mcp.cora-branch.com)
      # is the sole public entry and already targets 127.0.0.1:8082.
      - "127.0.0.1:8082:8080"
    volumes:
      - ./logs:/var/log/llm-mcp
    healthcheck:
      # python:slim has no curl/wget; use the stdlib. urlopen raises on a
      # non-2xx (e.g. /health's 503), which marks the container unhealthy.
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
