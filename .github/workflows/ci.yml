name: CI

on:
  pull_request:
  push:
    branches:
      - claude/llm-api-discovery-module-l0CAC
      - main

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[all,test]"

      - name: Run tests
        run: pytest tests/ -v
