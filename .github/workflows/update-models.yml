name: Update model data

on:
  schedule:
    # Every Monday at 06:00 UTC
    - cron: "0 6 * * 1"
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[all,test]"

      - name: Run tests (validate current static data)
        run: pytest tests/ -v

      - name: Fetch live models and update static data
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          INCEPTION_API_KEY: ${{ secrets.INCEPTION_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          ZAI_API_KEY: ${{ secrets.ZAI_API_KEY }}
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
          MOONSHOT_API_KEY: ${{ secrets.KIMI_API_KEY }}
          DASHSCOPE_API_KEY: ${{ secrets.QWEN_API_KEY }}
        run: python scripts/update_models.py

      - name: Check for changes
        id: diff
        run: |
          git diff --quiet llm_api_search/providers/ && echo "changed=false" >> "$GITHUB_OUTPUT" || echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Collect discovery notes
        id: notes
        if: steps.diff.outputs.changed == 'true'
        run: |
          {
            echo "body<<__NOTES_EOF__"
            cat model_update_notes.md 2>/dev/null || true
            echo "__NOTES_EOF__"
          } >> "$GITHUB_OUTPUT"

      - name: Validate updated static data
        id: posttest
        if: steps.diff.outputs.changed == 'true'
        continue-on-error: true
        run: pytest tests/ -v

      - name: Create pull request
        if: steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          branch: auto/update-models
          delete-branch: true
          draft: ${{ steps.posttest.outcome == 'failure' }}
          title: "chore: update model data from live APIs"
          body: |
            ${{ steps.posttest.outcome == 'failure' && '> ⚠️ **Post-update tests failed.** This PR is a draft — fix the broken models before marking ready for review.' || '' }}

            Automated weekly update of static model data.

            **What changed:**
            - Fetched live model lists from Anthropic, OpenAI, Google, Inception Labs, and DeepSeek APIs
            - New models added with `pricing=None` — please fill in before merging

            **Review checklist:**
            - [ ] Check new models have correct specs
            - [ ] Add pricing for any `TODO: add pricing` entries
            - [ ] Tests pass

            ${{ steps.notes.outputs.body }}

            _Generated by the `update-models` workflow._
          commit-message: "chore: update static model data from live APIs"
          labels: |
            automation
            models
            ${{ steps.posttest.outcome == 'failure' && 'needs-pricing' || '' }}

      - name: Fail job if post-update tests failed
        if: steps.posttest.outcome == 'failure'
        run: |
          echo "::error::Post-update pytest failed — see the 'Validate updated static data' step. PR was still opened as a draft for review."
          exit 1
