name: Update model data

on:
  schedule:
    # Every Monday at 06:00 UTC
    - cron: "0 6 * * 1"
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[all,test]"

      - name: Run tests (validate current static data)
        run: pytest tests/ -v

      - name: Fetch live models and update static data
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          INCEPTION_API_KEY: ${{ secrets.INCEPTION_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          ZAI_API_KEY: ${{ secrets.ZAI_API_KEY }}
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
          MOONSHOT_API_KEY: ${{ secrets.KIMI_API_KEY }}
          DASHSCOPE_API_KEY: ${{ secrets.QWEN_API_KEY }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
        run: python scripts/update_models.py

      - name: Check for changes
        id: diff
        run: |
          # models_changed: real provider-data drift (new/updated models) — drives
          # the review checklist and needs-pricing labeling.
          # changed: models_changed OR just the data_version.py freshness stamp.
          # Gating the PR on `changed` (not `models_changed`) matters: on a quiet
          # week with no live drift, update_models.py still rewrites data_version.py
          # with today's date. If the PR were skipped whenever providers/ didn't
          # move, that stamp would never get committed, and catalog.py's
          # generated_at would freeze at the last real model change — making a
          # verified-fresh week silently read as stale to downstream consumers.
          if git diff --quiet llm_api_search/providers/; then
            models_changed=false
          else
            models_changed=true
          fi
          echo "models_changed=$models_changed" >> "$GITHUB_OUTPUT"

          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

          if [ "$models_changed" = "true" ]; then
            echo "pr_title=chore: update model data from live APIs" >> "$GITHUB_OUTPUT"
            {
              echo "body_intro<<__BODY_EOF__"
              echo "Automated weekly update of static model data."
              echo ""
              echo "**What changed:**"
              echo "- Fetched live model lists from Anthropic, OpenAI, Google, Inception Labs, and DeepSeek APIs"
              echo "- New models added with \`pricing=None\` — please fill in before merging"
              echo "__BODY_EOF__"
            } >> "$GITHUB_OUTPUT"
          else
            echo "pr_title=chore: confirm model data freshness (no changes)" >> "$GITHUB_OUTPUT"
            {
              echo "body_intro<<__BODY_EOF__"
              echo "Automated weekly freshness check found no model drift — this PR only advances the \`data_version.py\` stamp so \`catalog.json\`'s \`generated_at\` reflects that the data was re-verified this week."
              echo ""
              echo "**What changed:**"
              echo "- Nothing in \`llm_api_search/providers/\` — only the freshness stamp in \`llm_api_search/data_version.py\`"
              echo "__BODY_EOF__"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Collect discovery notes
        id: notes
        if: steps.diff.outputs.models_changed == 'true'
        run: |
          {
            echo "body<<__NOTES_EOF__"
            cat model_update_notes.md 2>/dev/null || true
            echo "__NOTES_EOF__"
          } >> "$GITHUB_OUTPUT"

      - name: Validate updated static data
        id: posttest
        if: steps.diff.outputs.changed == 'true'
        continue-on-error: true
        run: pytest tests/ -v

      - name: Create pull request
        if: steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          branch: auto/update-models
          delete-branch: true
          draft: ${{ steps.posttest.outcome == 'failure' }}
          title: ${{ steps.diff.outputs.pr_title }}
          body: |
            ${{ steps.posttest.outcome == 'failure' && '> ⚠️ **Post-update tests failed.** This PR is a draft — fix the broken models before marking ready for review.' || '' }}

            ${{ steps.diff.outputs.body_intro }}

            **Review checklist:**
            - [ ] Check new models have correct specs
            - [ ] Add pricing for any `TODO: add pricing` entries
            - [ ] Tests pass

            ${{ steps.notes.outputs.body }}

            _Generated by the `update-models` workflow._
          commit-message: "chore: update static model data from live APIs"
          labels: |
            automation
            models
            ${{ steps.posttest.outcome == 'failure' && 'needs-pricing' || '' }}

      - name: Fail job if post-update tests failed
        if: steps.posttest.outcome == 'failure'
        run: |
          echo "::error::Post-update pytest failed — see the 'Validate updated static data' step. PR was still opened as a draft for review."
          exit 1
