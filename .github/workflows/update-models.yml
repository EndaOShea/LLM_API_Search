name: Update model data

on:
  schedule:
    # Every Monday at 06:00 UTC
    - cron: "0 6 * * 1"
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[all,test]"

      - name: Fetch live models and update static data
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          INCEPTION_API_KEY: ${{ secrets.INCEPTION_API_KEY }}
        run: python scripts/update_models.py

      - name: Run tests
        run: pytest tests/ -v

      - name: Check for changes
        id: diff
        run: |
          git diff --quiet llm_api_search/providers/ && echo "changed=false" >> "$GITHUB_OUTPUT" || echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Create pull request
        if: steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          branch: auto/update-models
          delete-branch: true
          title: "chore: update model data from live APIs"
          body: |
            Automated weekly update of static model data.

            **What changed:**
            - Fetched live model lists from Anthropic, OpenAI, Google, and Inception Labs APIs
            - New models added with `pricing=None` — please fill in before merging

            **Review checklist:**
            - [ ] Check new models have correct specs
            - [ ] Add pricing for any `TODO: add pricing` entries
            - [ ] Tests pass

            _Generated by the `update-models` workflow._
          commit-message: "chore: update static model data from live APIs"
          labels: automation, models
